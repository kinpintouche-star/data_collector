name: Live Collector Daily

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      symbols:
        description: "Optional comma-separated symbols, e.g. BTCUSD,EURUSD,MNQ"
        required: false
        type: string
      since:
        description: "Optional UTC start, e.g. 2026-07-06T00:00:00+00:00"
        required: false
        type: string
      until:
        description: "Optional UTC end, e.g. 2026-07-07T00:00:00+00:00"
        required: false
        type: string
      max_workers:
        description: "Parallel assets"
        required: false
        default: "4"
        type: string
      dry_run:
        description: "Validate workflow without touching Neon/providers"
        required: false
        default: false
        type: boolean

concurrency:
  group: live-collector-daily
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      LIVE_REMOTE_DATABASE_URL: ${{ secrets.LIVE_REMOTE_DATABASE_URL }}
      SYMBOLS: ${{ inputs.symbols }}
      SINCE: ${{ inputs.since }}
      UNTIL: ${{ inputs.until }}
      MAX_WORKERS: ${{ inputs.max_workers || '4' }}
      DRY_RUN: ${{ inputs.dry_run || false }}
      LOG_PATH: collector-logs/live-collector-daily.jsonl
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install project
        run: python -m pip install -e .

      - name: Bootstrap remote Neon
        shell: bash
        run: |
          set -euo pipefail
          if [ "${DRY_RUN}" = "true" ]; then
            echo "Dry run: skipping Neon bootstrap."
            exit 0
          fi
          if [ -z "${LIVE_REMOTE_DATABASE_URL:-}" ]; then
            echo "LIVE_REMOTE_DATABASE_URL secret is required." >&2
            exit 2
          fi
          echo "::group::Remote DB upgrade and seed"
          export DATABASE_URL="$LIVE_REMOTE_DATABASE_URL"
          python -m ict.cli db upgrade
          python -m ict.cli sources sync
          python -m ict.cli symbols sync
          python -m ict.cli live register-sources --remote-database-url "$LIVE_REMOTE_DATABASE_URL"
          echo "::endgroup::"

      - name: Collect live candles into Neon
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$LOG_PATH")"
          echo "::group::Collector run"
          args=(live collect-remote --trigger-type github_actions_daily --max-workers "$MAX_WORKERS" --upload-chunk-rows 2500 --submit-pause-seconds 0.35 --emit-jsonl --log-path "$LOG_PATH")
          if [ "${DRY_RUN}" = "true" ]; then
            args+=(--dry-run)
          fi
          if [ -n "${SYMBOLS:-}" ]; then
            args+=(--symbols "$SYMBOLS")
          fi
          if [ -n "${SINCE:-}" ] || [ -n "${UNTIL:-}" ]; then
            if [ -z "${SINCE:-}" ] || [ -z "${UNTIL:-}" ]; then
              echo "Use both since and until, or neither." >&2
              exit 2
            fi
            args+=(--since "$SINCE" --until "$UNTIL")
          fi
          python -m ict.cli "${args[@]}"
          echo "::endgroup::"

      - name: Write collector summary
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          log_path = Path(os.environ.get("LOG_PATH", "collector-logs/live-collector-daily.jsonl"))
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          events = []
          if log_path.exists():
              events = [json.loads(line) for line in log_path.read_text(encoding="utf-8").splitlines() if line.strip()]
          completed = next((event for event in reversed(events) if event["event"] in {"run_completed", "run_failed"}), None)
          with summary_path.open("a", encoding="utf-8") as handle:
              handle.write("# Live Collector Daily\\n\\n")
              handle.write(f"- Dry run: `{os.environ.get('DRY_RUN')}`\\n")
              handle.write(f"- Symbols input: `{os.environ.get('SYMBOLS') or 'all enabled'}`\\n")
              if completed:
                  for key in ["event", "run_id", "status", "assets_requested", "assets_succeeded", "assets_failed", "rows_written", "since", "until"]:
                      if key in completed:
                          handle.write(f"- {key}: `{completed[key]}`\\n")
              else:
                  handle.write("- No collector summary event was written. Check logs.\\n")
          PY

      - name: Upload collector logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-collector-daily-logs
          path: collector-logs/
          if-no-files-found: ignore
