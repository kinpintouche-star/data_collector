services:
  postgres:
    image: postgres:16
    container_name: ict_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ict}
      POSTGRES_USER: ${POSTGRES_USER:-ict}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ict}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ict} -d ${POSTGRES_DB:-ict}"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    container_name: ict_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
