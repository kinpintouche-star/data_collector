services:
  postgres:
    image: postgres:16
    container_name: ict_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ict}
      POSTGRES_USER: ${POSTGRES_USER:-ict}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ict}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ict} -d ${POSTGRES_DB:-ict}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ict_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ict}:${POSTGRES_PASSWORD:-ict}@postgres:5432/${POSTGRES_DB:-ict}
      LIVE_REMOTE_DATABASE_URL: ${LIVE_REMOTE_DATABASE_URL:-}
      MARKET_ARCHIVE_KEY: ${MARKET_ARCHIVE_KEY:-}
      MARKET_ARCHIVE_CACHE_DIR: ${MARKET_ARCHIVE_CACHE_DIR:-.cache/market_archive}
      MARKET_ARCHIVE_PREFIX: ${MARKET_ARCHIVE_PREFIX:-market-candles}
      MARKET_ARCHIVE_STARTUP_RESTORE_ENABLED: ${MARKET_ARCHIVE_STARTUP_RESTORE_ENABLED:-true}
      MARKET_ARCHIVE_STARTUP_DAYS: ${MARKET_ARCHIVE_STARTUP_DAYS:-7}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      R2_ENDPOINT_URL: ${R2_ENDPOINT_URL:-}
    command: >
      sh -c "python -m alembic upgrade head
      && python -m ict.cli db seed-defaults
      && if [ \"$$MARKET_ARCHIVE_STARTUP_RESTORE_ENABLED\" = \"true\" ]; then python -m ict.cli archive restore-from-r2 --days \"$$MARKET_ARCHIVE_STARTUP_DAYS\" --continue-on-missing || echo 'Archive startup restore skipped.'; else echo 'Archive startup restore disabled.'; fi
      && python -m uvicorn ict.api.app:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: ict_web
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8000
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_healthy

  adminer:
    image: adminer:4
    container_name: ict_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  web_node_modules:
