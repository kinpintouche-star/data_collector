services:
  collector-live:
    build:
      context: ../..
      dockerfile: Dockerfile.api
    container_name: ict_remote_collector_live
    restart: unless-stopped
    command: python scripts/live_collector_service.py
    environment:
      LIVE_REMOTE_DATABASE_URL: ${LIVE_REMOTE_DATABASE_URL:?set LIVE_REMOTE_DATABASE_URL}
      LIVE_COLLECTOR_MODE: rolling
      LIVE_COLLECTOR_INTERVAL_SECONDS: ${LIVE_COLLECTOR_INTERVAL_SECONDS:-3600}
      LIVE_COLLECTOR_LOOKBACK_MINUTES: ${LIVE_COLLECTOR_LOOKBACK_MINUTES:-180}
      LIVE_COLLECTOR_SAFETY_DELAY_MINUTES: ${LIVE_COLLECTOR_SAFETY_DELAY_MINUTES:-3}
      LIVE_COLLECTOR_RUN_ON_START: ${LIVE_COLLECTOR_RUN_ON_START:-true}
      LIVE_COLLECTOR_SYMBOLS: ${LIVE_COLLECTOR_SYMBOLS:-}
      LIVE_COLLECTOR_MAX_WORKERS: ${LIVE_COLLECTOR_MAX_WORKERS:-4}
      LIVE_COLLECTOR_UPLOAD_CHUNK_ROWS: ${LIVE_COLLECTOR_UPLOAD_CHUNK_ROWS:-2500}
      LIVE_COLLECTOR_SUBMIT_PAUSE_SECONDS: ${LIVE_COLLECTOR_SUBMIT_PAUSE_SECONDS:-0.35}

  collector-repair:
    build:
      context: ../..
      dockerfile: Dockerfile.api
    container_name: ict_remote_collector_repair
    restart: unless-stopped
    command: python scripts/live_collector_service.py
    environment:
      LIVE_REMOTE_DATABASE_URL: ${LIVE_REMOTE_DATABASE_URL:?set LIVE_REMOTE_DATABASE_URL}
      LIVE_COLLECTOR_MODE: daily
      LIVE_COLLECTOR_DAILY_UTC_HOUR: ${LIVE_COLLECTOR_DAILY_UTC_HOUR:-2}
      LIVE_COLLECTOR_DAILY_UTC_MINUTE: ${LIVE_COLLECTOR_DAILY_UTC_MINUTE:-17}
      LIVE_COLLECTOR_BACKFILL_DAYS: ${LIVE_COLLECTOR_BACKFILL_DAYS:-3}
      LIVE_COLLECTOR_RUN_ON_START: ${LIVE_COLLECTOR_REPAIR_RUN_ON_START:-true}
      LIVE_COLLECTOR_SYMBOLS: ${LIVE_COLLECTOR_SYMBOLS:-}
      LIVE_COLLECTOR_MAX_WORKERS: ${LIVE_COLLECTOR_MAX_WORKERS:-4}
      LIVE_COLLECTOR_UPLOAD_CHUNK_ROWS: ${LIVE_COLLECTOR_UPLOAD_CHUNK_ROWS:-2500}
      LIVE_COLLECTOR_SUBMIT_PAUSE_SECONDS: ${LIVE_COLLECTOR_SUBMIT_PAUSE_SECONDS:-0.35}
